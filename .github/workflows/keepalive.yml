name: Keep Backend Alive

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Print Time
        run: date

      - name: Ping Backend
        run: |
          curl -f -A "render-keepalive-bot" https://fullstack-portfolio-vdvq.onrender.com/health/
          echo "Backend pinged successfully at $(date)"